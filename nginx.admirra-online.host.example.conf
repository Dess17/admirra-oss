# Пример для сервера admirra.online (Nginx на ВМ, не внутри Docker).
# Сохранить как /etc/nginx/sites-available/admirra.online и включить symlink в sites-enabled.
#
# Без отдельного server { listen 80; return 301 ... } сайт на http:// останется без редиректа.

server {
    listen 80;
    listen [::]:80;
    server_name admirra.online www.admirra.online;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name admirra.online www.admirra.online;

    ssl_certificate     /etc/letsencrypt/live/admirra.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/admirra.online/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 50M;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8001/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}
